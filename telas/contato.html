<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="../js/script.js"></script>
    <link rel="icon" href="../img/iconex.png" type="image/x-icon">

</head>

<body>

    <header class="header">
        <div class="container">
            <h1>Contato</h1>
        </div>
        <nav class="navbar">
            <div class="container">
                <ul>
                    <li><a href="../index.html">Sobre Mim</a></li>
                    <li><a href="contato.html" class="active">Contato</a></li>
                    <li><a href="formacao.html">Formação</a></li>
                    <li><a href="portifolio.html">Portifólio</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section>
            <h2>Entre em Contato</h2>

            <form id="formContato">
                <fieldset>
                    <legend>Envie uma mensagem</legend>

                    <label for="nome">
                        Nome
                    </label>
                    <input type="text" id="nome" name="nome" required>

                    <label for="email">
                        E-mail
                    </label>
                    <input type="email" id="email" name="email" required>

                    <label for="mensagem">
                        Mensagem
                    </label>
                    <textarea id="mensagem" rows="8" required></textarea>
                    <button type="submit">
                        Enviar
                    </button>
                </fieldset>

            </form>
            <p id="resposta"></p>
        </section>
    </main>
</body>

</html>
